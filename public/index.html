<!DOCTYPE html>
<html>
<head>
  <title>Mars</title>
  <style>
    @import url('https://googleapis.com');
    :root { --bg: linear-gradient(-45deg, #2e0249, #570a57, #a91079, #ff6b6b, #ffa500); --accent: #ff8c00; }
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); background-size: cover; background-position: center; transition: 0.5s ease; }
    
    .bg-animation { position: fixed; top:0; left:0; width: 100%; height: 100%; background: var(--bg); background-size: 400% 400%; animation: sunset-move 15s ease infinite; z-index: -1; }
    @keyframes sunset-move { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

    #home-button { position: fixed; bottom: 25px; left: 25px; z-index: 10000; cursor: grab; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 50%; backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255, 255, 255, 0.2); touch-action: none; user-select: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .top-bar { position: absolute; top: 0; left: 0; right: 0; padding: 25px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
    #clock { font-size: 0.9rem; color: white; background: rgba(0,0,0,0.3); padding: 8px 18px; border-radius: 50px; backdrop-filter: blur(10px); }
    .icon-btn { cursor: pointer; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 50px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    
    .container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    .glass-panel { background: rgba(0,0,0,0.25); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px; padding: 60px 40px; width: 500px; text-align: center; }
    h1 { font-size: 3.5rem; margin-bottom: 40px; letter-spacing: 15px; font-weight: 300; color: white; margin-top: 0; text-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    input { width: 100%; max-width: 400px; padding: 18px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.1); color: white; font-size: 1rem; outline: none; text-align: center; }

    .bookmarks { display: flex; justify-content: center; gap: 20px; margin-top: 40px; }
    .bookmark-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.3s; }
    .bookmark-item:hover { transform: translateY(-8px); }
    .bookmark-icon { width: 55px; height: 55px; border-radius: 14px; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.15); overflow: hidden; }
    .bookmark-icon img { width: 32px; height: 32px; }
    .bookmark-item span { font-size: 0.6rem; color: white; font-weight: 800; letter-spacing: 1px; opacity: 0.8; }

    #settings-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); display: none; justify-content: center; align-items: center; z-index: 10001; }
    .settings-content { background: rgba(255,255,255,0.05); padding: 35px; border-radius: 30px; width: 450px; max-height: 85vh; overflow-y: auto; color: white; border: 1px solid rgba(255,255,255,0.1); }
    .section-label { font-size: 0.7rem; opacity: 0.5; letter-spacing: 2px; margin: 20px 0 10px 0; font-weight: 800; color: var(--accent); }
    .option { background: rgba(255,255,255,0.05); padding: 12px 18px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
    .option:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.1); }
    .setting-input { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 8px; border-radius: 8px; width: 100%; margin-top: 5px; }
  </style>
</head>
<body>

  <div class="bg-animation" id="main-bg"></div>

  <div id="settings-overlay">
    <div class="settings-content">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="font-weight:300;">System Config</h2>
        <span onclick="toggleSettings()" style="cursor:pointer; font-size:2rem;">&times;</span>
      </div>

      <div class="section-label">SEARCH ENGINE</div>
      <div class="option" onclick="setEngine('google')"><span>Google</span><span id="check-google"></span></div>
      <div class="option" onclick="setEngine('bing')"><span>Bing</span><span id="check-bing"></span></div>
      <div class="option" onclick="setEngine('duck')"><span>DuckDuckGo</span><span id="check-duck"></span></div>

      <div class="section-label">CUSTOM BACKGROUND</div>
      <div style="padding: 0 5px;">
        <input type="text" id="bg-url" class="setting-input" placeholder="Paste Image URL..." onchange="setCustomBg(this.value)">
        <p style="font-size: 0.6rem; opacity: 0.5; margin-top: 10px;">Or upload a file:</p>
        <input type="file" id="bg-file" class="setting-input" accept="image/*" onchange="uploadBg(event)">
      </div>

      <div class="section-label">CLOAKING</div>
      <div class="option" onclick="setCloak('none')"><span>Mars (Default)</span></div>
      <div class="option" onclick="setCloak('drive')"><span>Google Drive</span></div>
      <div class="option" onclick="setCloak('classroom')"><span>Classroom</span></div>

      <div class="section-label">UTILITIES</div>
      <div class="option" onclick="localStorage.clear(); location.reload();" style="color: #ff6b6b;"><span>Reset All Settings</span></div>
    </div>
  </div>

  <div class="top-bar">
    <div id="clock">00:00:00</div>
    <div class="icon-btn" onclick="toggleSettings()">⚙️</div>
  </div>

  <div id="home-button">
    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
      <polyline points="9 22 9 12 15 12 15 22"></polyline>
    </svg>
  </div>

  <div class="container">
    <div class="glass-panel">
      <h1>MARS</h1>
      <form id="uv-form"><input id="uv-address" type="text" placeholder="Where to next..." autocomplete="off"></form>
      <div class="bookmarks">
        <div class="bookmark-item" onclick="proxy('https://google.com')">
          <div class="bookmark-icon"><img src="https://google.com"></div>
          <span>GOOGLE</span>
        </div>
        <div class="bookmark-item" onclick="proxy('https://youtube.com')">
          <div class="bookmark-icon"><img src="https://google.com"></div>
          <span>YOUTUBE</span>
        </div>
        <div class="bookmark-item" onclick="proxy('https://tubitv.com')">
          <div class="bookmark-icon" style="font-size: 24px;">🍿</div>
          <span>MOVIES</span>
        </div>
        <div class="bookmark-item" onclick="proxy('https://1v1.lol')">
          <div class="bookmark-icon" style="font-size: 24px;">🔫</div>
          <span>GAMES</span>
        </div>
      </div>
    </div>
  </div>

<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script>
  // 1. SEARCH ENGINE LOGIC
  let currentEngine = localStorage.getItem('mars-engine') || 'google';
  const engines = {
    google: 'https://google.com',
    bing: 'https://bing.com',
    duck: 'https://duckduckgo.com'
  };

  function setEngine(e) {
    currentEngine = e;
    localStorage.setItem('mars-engine', e);
    document.querySelectorAll('[id^="check-"]').forEach(el => el.innerText = '');
    document.getElementById('check-' + e).innerText = '●';
  }
  setEngine(currentEngine);

  // 2. BACKGROUND LOGIC
  function setCustomBg(url) {
    if(!url) return;
    document.body.style.backgroundImage = `url('${url}')`;
    document.getElementById('main-bg').style.display = 'none';
    localStorage.setItem('mars-bg', url);
  }

  function uploadBg(event) {
    const reader = new FileReader();
    reader.onload = () => setCustomBg(reader.result);
    reader.readAsDataURL(event.target.files[0]);
  }

  // 3. CLOAKING
  const cloaks = {
    none: { t: "Mars", i: "" },
    drive: { t: "My Drive - Google Drive", i: "https://gstatic.com" },
    classroom: { t: "Classes", i: "https://gstatic.com" }
  };

  function setCloak(type) {
    const cloak = cloaks[type];
    document.title = cloak.t;
    let link = document.querySelector("link[rel~='icon']");
    if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
    link.href = cloak.i;
    localStorage.setItem('mars-cloak', type);
  }

  // 4. PROXY
  function proxy(url) {
    window.navigator.serviceWorker.register('/uv/sw.js', { scope: __uv$config.prefix }).then(() => {
      let target = url.trim();
      if (!target.includes('.') || target.includes(' ')) {
        target = engines[currentEngine] + encodeURIComponent(target);
      } else if (!target.startsWith('http')) {
        target = `https://${target}`;
      }
      window.location.href = __uv$config.prefix + __uv$config.encodeUrl(target);
    });
  }

  document.getElementById('uv-form').onsubmit = (e) => { e.preventDefault(); proxy(document.getElementById('uv-address').value); };

  // 5. UI EXTRAS
  function toggleSettings() { const s = document.getElementById('settings-overlay'); s.style.display = s.style.display === 'flex' ? 'none' : 'flex'; }
  function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }
  setInterval(updateClock, 1000); updateClock();

  window.onkeydown = (e) => { if(e.key === "Escape") window.location.href = "https://google.com"; };

  // 6. DRAGGABLE HOME BUTTON
  const btn = document.getElementById('home-button');
  let isDragging = false, startX, startY;
  btn.onpointerdown = (e) => {
    isDragging = false; startX = e.clientX - btn.getBoundingClientRect().left; startY = e.clientY - btn.getBoundingClientRect().top;
    btn.setPointerCapture(e.pointerId);
    btn.onpointermove = (ev) => { isDragging = true; btn.style.left = (ev.clientX - startX) + 'px'; btn.style.top = (ev.clientY - startY) + 'px'; btn.style.bottom = 'auto'; };
    btn.onpointerup = () => { btn.onpointermove = null; if (!isDragging) window.location.href = '/'; };
  };

  // Load Saved State
  if (localStorage.getItem('mars-cloak')) setCloak(localStorage.getItem('mars-cloak'));
  if (localStorage.getItem('mars-bg')) setCustomBg(localStorage.getItem('mars-bg'));
</script>
</body>
</html>
