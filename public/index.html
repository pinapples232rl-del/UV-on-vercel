<!DOCTYPE html>
<html>
<head>
  <title>Mars</title>
  <!-- Direct Mars Icon Link -->
  <link rel="icon" href="https://freepnglogos.com" type="image/png">
<link rel="shortcut icon" href="https://freepnglogos.com" type="image/png">

  
  <style>
    @import url('https://googleapis.com');

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      /* Moving Sunset Gradient */
      background: linear-gradient(-45deg, #2e0249, #570a57, #a91079, #ff6b6b, #ffa500);
      background-size: 400% 400%;
      animation: sunset-move 12s ease infinite;
    }

    @keyframes sunset-move {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: white;
    }

    .glass-panel {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 50px 40px;
      width: 90%;
      max-width: 550px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 30px;
      letter-spacing: 8px;
      font-weight: 300;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
    }

    input {
      width: 100%;
      padding: 18px;
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 1.1rem;
      outline: none;
      box-sizing: border-box;
      text-align: center;
      transition: 0.3s;
    }

    input:focus {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid #ffa500;
    }

    .panic-hint {
      margin-top: 20px;
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="glass-panel">
      <h1>MARS</h1>
      <form id="uv-form">
        <input id="uv-address" type="text" placeholder="Enter URL or Search Query" autocomplete="off">
      </form>
      <div class="panic-hint">Press ESC to quickly hide this page</div>
    </div>
  </div>

<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script>
  const form = document.getElementById('uv-form');
  const input = document.getElementById('uv-address');

  // Panic Switch
  document.addEventListener('keydown', (e) => {
    if (e.key === "Escape") window.location.href = "https://google.com";
  });

  form.addEventListener('submit', async event => {
    event.preventDefault();
    window.navigator.serviceWorker.register('/uv/sw.js', {
      scope: __uv$config.prefix
    }).then(() => {
      let url = input.value.trim();
      if (!isUrl(url)) url = 'https://google.com/search?q=' + encodeURIComponent(url);
      else if (!(url.startsWith('https://') || url.startsWith('http://'))) url = 'http://' + url;

      window.location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
    });
  });

  function isUrl(val = '') {
    if (/^http(s?):\/\//.test(val) || val.includes('.') && val.substr(0, 1) !== ' ') return true;
    return false;
  };
</script>

</body>
</html>
