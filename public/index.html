<!DOCTYPE html>
<html>
<head>
  <title>Mars</title>
  <!-- Force Icon Update -->
  <link rel="icon" type="image/png" href="https://wikimedia.org">
  <link rel="shortcut icon" type="image/png" href="https://wikimedia.org">
  
  <style>
    @import url('https://googleapis.com');

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(-45deg, #2e0249, #570a57, #a91079, #ff6b6b, #ffa500);
      background-size: 400% 400%;
      animation: sunset-move 12s ease infinite;
    }

    @keyframes sunset-move {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: white;
    }

    .glass-panel {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 50px 40px;
      width: 90%;
      max-width: 550px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 30px;
      letter-spacing: 8px;
      font-weight: 300;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
    }

    input {
      width: 100%;
      padding: 18px;
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 1.1rem;
      outline: none;
      box-sizing: border-box;
      text-align: center;
      transition: 0.3s;
    }

    input:focus {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid #ffa500;
    }

    .panic-hint {
      margin-top: 20px;
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
</html>
