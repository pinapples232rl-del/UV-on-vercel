<!DOCTYPE html>
<html>
<head>
  <title>Mars</title>
  <!-- Direct Link to your Mars Icon -->
  <link rel="icon" type="image/png" href="https://icons8.com">
  
  <style>
    @import url('https://googleapis.com');

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      /* Your Sunset Gradient */
      background: linear-gradient(-45deg, #2e0249, #570a57, #a91079, #ff6b6b, #ffa500);
      background-size: 400% 400%;
      animation: sunset-move 12s ease infinite;
    }

    @keyframes sunset-move {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: white;
    }

    .glass-panel {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 50px 40px;
      width: 90%;
      max-width: 550px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 30px;
      letter-spacing: 8px;
      font-weight: 300;
    }

    input {
      width: 100%;
      padding: 18px;
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 1.1rem;
      outline: none;
      box-sizing: border-box;
      text-align: center;
    }

    input:focus {
      border: 1px solid #ffa500;
    }
  </style>
</head>
<body>
input::placeholder {
  color: rgba(255, 255, 255, 0.5);
  font-weight: 300;
  letter-spacing: 2px;
  text-transform: uppercase;
  font-size: 0.8rem;
}
  <div class="container">
    <div class="glass-panel">
      <h1>MARS</h1>
      <form id="uv-form">
        <input id="uv-address" type="text" placeholder="Where to next..." autocomplete="off">
      </form>
    </div>
  </div>

<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script>
  const form = document.getElementById('uv-form');
  const input = document.getElementById('uv-address');

  form.addEventListener('submit', async event => {
    event.preventDefault();
    if (typeof __uv$config === 'undefined') return;
    
    window.navigator.serviceWorker.register('/uv/sw.js', {
      scope: __uv$config.prefix
    }).then(() => {
      let url = input.value.trim();
      if (!isUrl(url)) url = 'https://google.com' + encodeURIComponent(url);
      else if (!(url.startsWith('https://') || url.startsWith('http://'))) url = 'http://' + url;
      window.location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
    });
  });

  function isUrl(val = '') {
    if (/^http(s?):\/\//.test(val) || val.includes('.') && val.substr(0, 1) !== ' ') return true;
    return false;
  };
</script>

</body>
</html>
