<!DOCTYPE html>
<html>
<head>
  <title>My Private Proxy</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: black;
      color: white;
      font-family: sans-serif;
      overflow: hidden; /* Keeps the stars from making the page scroll */
    }
    #stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: black url('https://amazonaws.com') repeat;
      animation: move-stars 100s linear infinite;
    }
    @keyframes move-stars {
      from { background-position: 0 0; }
      to { background-position: -10000px 5000px; }
    }
    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
  </style>
</head>
<body>

  <div id="stars"></div>

  <div class="content">
    <h1>Welcome to the Stars</h1>
    <p>Loading Proxy...</p>
    <input type="text" id="urlInput" placeholder="Enter URL here">
  </div>

</body>
</html>
