<!DOCTYPE html>
<html>
<head>
  <title>Mars</title>
  <style>
    @import url('https://googleapis.com');

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(-45deg, #2e0249, #570a57, #a91079, #ff6b6b, #ffa500);
      background-size: 400% 400%;
      animation: sunset-move 12s ease infinite;
    }

    @keyframes sunset-move {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Top Bar Elements */
    .top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
      z-index: 10;
    }

    #clock {
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 2px;
      background: rgba(0,0,0,0.2);
      padding: 10px 20px;
      border-radius: 50px;
      backdrop-filter: blur(10px);
    }

    .settings-btn {
      cursor: pointer;
      background: rgba(0,0,0,0.2);
      padding: 10px;
      border-radius: 50px;
      backdrop-filter: blur(10px);
      transition: 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .settings-btn:hover {
      background: rgba(255,255,255,0.1);
      transform: rotate(45deg);
    }

    /* Main UI */
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .glass-panel {
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 40px;
      padding: 60px 40px;
      width: 90%;
      max-width: 600px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 40px;
      letter-spacing: 12px;
      font-weight: 300;
      color: white;
    }

    input {
      width: 100%;
      padding: 20px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.08);
      color: white;
      font-size: 1.1rem;
      outline: none;
      box-sizing: border-box;
      text-align: center;
      transition: all 0.4s ease;
    }

    input:focus {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      transform: scale(1.02);
    }

    .bookmarks {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 40px;
    }

    .bookmark-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      cursor: pointer;
      transition: 0.3s;
    }

    .icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .bookmark-item span {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 1px;
    }

    .bookmark-item:hover {
      transform: translateY(-8px);
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <div id="clock">00:00:00</div>
    <div class="settings-btn" onclick="alert('Settings Panel coming soon!')">
      <div class="icon" style="font-size: 24px; margin: 0;">⚙️</div>
    </div>
  </div>

  <div class="container">
    <div class="glass-panel">
      <h1>MARS</h1>
      
      <form id="uv-form">
        <input id="uv-address" type="text" placeholder="Where to next..." autocomplete="off">
      </form>

      <div class="bookmarks">
        <div class="bookmark-item" onclick="proxy('https://gn-math.dev')">
          <div class="icon">🎮</div>
          <span>GAMES</span>
        </div>
        <div class="bookmark-item" onclick="proxy('https://dorawatch.org')">
          <div class="icon">🎬</div>
          <span>MOVIES</span>
        </div>
        <div class="bookmark-item" onclick="proxy('https://monochrome.tf')">
          <div class="icon">🎵</div>
          <span>MUSIC</span>
        </div>
        <div class="bookmark-item" onclick="proxy('https://google.com')">
          <div class="icon">🔍</div>
          <span>GOOGLE</span>
        </div>
        <div class="bookmark-item" onclick="proxy('https://youtube.com')">
          <div class="icon">📺</div>
          <span>YOUTUBE</span>
        </div>
      </div>
    </div>
  </div>

<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script>
  // Clock Function
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
  }
  setInterval(updateClock, 1000);
  updateClock();

  // Proxy Logic
  const form = document.getElementById('uv-form');
  const input = document.getElementById('uv-address');

  async function proxy(url) {
    if (typeof __uv$config === 'undefined') return;
    window.navigator.serviceWorker.register('/uv/sw.js', { scope: __uv$config.prefix }).then(() => {
      if (!isUrl(url)) url = 'https://google.com' + encodeURIComponent(url);
      else if (!(url.startsWith('https://') || url.startsWith('http://'))) url = 'http://' + url;
      window.location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
    });
  }

  form.addEventListener('submit', async event => {
    event.preventDefault();
    proxy(input.value.trim());
  });

  function isUrl(val = '') {
    if (/^http(s?):\/\//.test(val) || val.includes('.') && val.substr(0, 1) !== ' ') return true;
    return false;
  };

  document.addEventListener('keydown', (e) => {
    if (e.key === "Escape") window.location.href = "https://google.com";
  });
</script>

</body>
</html>
