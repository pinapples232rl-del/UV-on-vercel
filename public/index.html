<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mars</title>
  <style>
    @import url('https://googleapis.com');
    :root { --bg: linear-gradient(-45deg, #2e0249, #570a57, #a91079, #ff6b6b, #ffa500); --accent: #ff8c00; }
    
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif; background: #000; transition: 0.5s ease; }
    
    /* Background Layer */
    .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); background-size: 400% 400%; animation: sunset 15s ease infinite; z-index: -1; background-position: center; background-repeat: no-repeat; }
    @keyframes sunset { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

    /* UI Elements */
    .top-bar { position: absolute; top: 0; left: 0; right: 0; padding: 25px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
    #clock { font-size: 0.9rem; color: white; background: rgba(0,0,0,0.3); padding: 8px 18px; border-radius: 50px; backdrop-filter: blur(10px); }
    .icon-btn { cursor: pointer; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 50px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); font-size: 1.2rem; }

    #home-button { position: fixed; bottom: 25px; left: 25px; z-index: 10000; cursor: grab; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 50%; backdrop-filter: blur(15px); display: flex; border: 1px solid rgba(255, 255, 255, 0.2); touch-action: none; user-select: none; }

    /* Main Container */
    .container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    .glass-panel { background: rgba(0,0,0,0.25); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px; padding: 60px 40px; width: 500px; text-align: center; }
    h1 { font-size: 3.5rem; margin: 0 0 40px 0; letter-spacing: 15px; font-weight: 300; color: white; }
    input { width: 100%; max-width: 400px; padding: 18px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.1); color: white; font-size: 1rem; outline: none; text-align: center; }

    /* Bookmarks */
    .bookmarks { display: flex; justify-content: center; gap: 25px; margin-top: 40px; }
    .bookmark-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.3s; }
    .bookmark-item:hover { transform: translateY(-8px); }
    .bookmark-icon { width: 55px; height: 55px; border-radius: 14px; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.15); }
    .bookmark-item span { font-size: 0.6rem; color: white; font-weight: 800; letter-spacing: 1px; opacity: 0.7; }

    /* Settings */
    #settings-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); display: none; justify-content: center; align-items: center; z-index: 10001; }
    .settings-content { background: rgba(255,255,255,0.05); padding: 35px; border-radius: 30px; width: 400px; color: white; border: 1px solid rgba(255,255,255,0.1); }
    .section-label { font-size: 0.7rem; opacity: 0.5; letter-spacing: 2px; margin: 20px 0 10px 0; font-weight: 800; color: var(--accent); }
    .option { background: rgba(255,255,255,0.05); padding: 12px 18px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
    .option:hover { background: rgba(255,255,255,0.1); }
    .setting-input { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px; border-radius: 8px; width: 95%; margin-top: 5px; }
  </style>
</head>
<body>

  <div class="bg-layer" id="main-bg"></div>

  <div id="settings-overlay">
    <div class="settings-content">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="font-weight:300; margin:0;">System Config</h2>
        <span onclick="toggleSettings()" style="cursor:pointer; font-size:2rem;">&times;</span>
      </div>

      <div class="section-label">SEARCH ENGINE</div>
      <div class="option" onclick="setEngine('google')"><span>Google</span><span id="check-google"></span></div>
      <div class="option" onclick="setEngine('bing')"><span>Bing</span><span id="check-bing"></span></div>
      <div class="option" onclick="setEngine('duck')"><span>DuckDuckGo</span><span id="check-duck"></span></div>

      <div class="section-label">WALLPAPER URL</div>
      <input type="text" id="bg-url" class="setting-input" placeholder="Paste image link..." onchange="setCustomBg(this.value)">

      <div class="section-label">TAB CLOAK</div>
      <div class="option" onclick="setCloak('none')"><span>Mars (Default)</span></div>
      <div class="option" onclick="setCloak('drive')"><span>Google Drive</span></div>
      <div class="option" onclick="setCloak('classroom')"><span>Classroom</span></div>

      <div class="section-label">DANGER ZONE</div>
      <div class="option" onclick="localStorage.clear(); location.reload();" style="color:#ff6b6b"><span>Wipe All Data</span></div>
    </div>
  </div>

  <div class="top-bar">
    <div id="clock">00:00:00</div>
    <div class="icon-btn" onclick="toggleSettings()">⚙️</div>
  </div>

  <div id="home-button">
    <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
  </div>

  <div class="container">
    <div class="glass-panel">
      <h1>MARS</h1>
      <form id="uv-form"><input id="uv-address" type="text" placeholder="Where to next..." autocomplete="off"></form>
      
      <div class="bookmarks">
        <div class="bookmark-item" onclick="proxy('https://google.com')">
          <div class="bookmark-icon">
            <svg viewBox="0 0 24 24" width="28" height="28"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          </div>
          <span>GOOGLE</span>
        </div>
        <div class="bookmark-item" onclick="proxy('https://youtube.com')">
          <div class="bookmark-icon">
            <svg viewBox="0 0 24 24" width="30" height="30"><path fill="#FF0000" d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814z"/><path fill="#FFFFFF" d="M9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
          </div>
          <span>YOUTUBE</span>
        </div>
        <div class="bookmark-item" onclick="proxy('https://tubitv.com')"><div class="bookmark-icon" style="font-size:24px">🍿</div><span>MOVIES</span></div>
        <div class="bookmark-item" onclick="proxy('https://1v1.lol')"><div class="bookmark-icon" style="font-size:24px">🎮</div><span>GAMES</span></div>
      </div>
    </div>
  </div>

<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script>
  // 1. Core State
  let engine = localStorage.getItem('mars-engine') || 'google';
  const engines = { google: 'https://google.com', bing: 'https://bing.com', duck: 'https://duckduckgo.com' };

  function setEngine(e) {
    engine = e; localStorage.setItem('mars-engine', e);
    document.querySelectorAll('[id^="check-"]').forEach(el => el.innerText = '');
    document.getElementById('check-' + e).innerText = '●';
  }
  setEngine(engine);

  // 2. Wallpaper & Cloak
  function setCustomBg(url) {
    if(!url) return;
    document.body.style.backgroundImage = `url('${url}')`;
    document.body.style.backgroundSize = 'cover';
    document.getElementById('main-bg').style.opacity = '0';
    localStorage.setItem('mars-bg', url);
  }

  function setCloak(type) {
    const map = { none: ["Mars", ""], drive: ["My Drive - Google Drive", "https://gstatic.com"], classroom: ["Classes", "https://gstatic.com"] };
    document.title = map[type][0];
    let link = document.querySelector("link[rel*='icon']") || document.createElement('link');
    link.rel = 'icon'; link.href = map[type][1];
    document.head.appendChild(link);
    localStorage.setItem('mars-cloak', type);
  }

  // 3. Proxy Logic
  function proxy(url) {
    window.navigator.serviceWorker.register('/uv/sw.js', { scope: __uv$config.prefix }).then(() => {
      let target = url.trim();
      if (!target.includes('.') || target.includes(' ')) target = engines[engine] + encodeURIComponent(target);
      else if (!target.startsWith('http')) target = `https://${target}`;
      window.location.href = __uv$config.prefix + __uv$config.encodeUrl(target);
    });
  }

  document.getElementById('uv-form').onsubmit = (e) => { e.preventDefault(); proxy(document.getElementById('uv-address').value); };

  // 4. UI Extras
  function toggleSettings() { const s = document.getElementById('settings-overlay'); s.style.display = s.style.display === 'flex' ? 'none' : 'flex'; }
  function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }
  setInterval(updateClock, 1000); updateClock();
  window.onkeydown = (e) => { if(e.key === "Escape") window.location.href = "https://google.com"; };

  // 5. Draggable Home
  const btn = document.getElementById('home-button');
  let isDragging = false, startX, startY;
  btn.onpointerdown = (e) => {
    isDragging = false; startX = e.clientX - btn.getBoundingClientRect().left; startY = e.clientY - btn.getBoundingClientRect().top;
    btn.setPointerCapture(e.pointerId);
    btn.onpointermove = (ev) => { isDragging = true; btn.style.left = (ev.clientX - startX) + 'px'; btn.style.top = (ev.clientY - startY) + 'px'; btn.style.bottom = 'auto'; };
    btn.onpointerup = () => { btn.onpointermove = null; if (!isDragging) window.location.href = '/'; };
  };

  // Init
  if (localStorage.getItem('mars-cloak')) setCloak(localStorage.getItem('mars-cloak'));
  if (localStorage.getItem('mars-bg')) setCustomBg(localStorage.getItem('mars-bg'));
</script>
</body>
</html>
