<!DOCTYPE html>
<html>
<head>
  <title>Mars</title>
  <style>
    @import url('https://googleapis.com');

    :root {
      --bg: linear-gradient(-45deg, #2e0249, #570a57, #a91079, #ff6b6b, #ffa500);
      --accent: #ff8c00;
    }

    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      background-size: 400% 400%;
      animation: sunset-move 15s ease infinite;
      transition: background 0.5s ease;
    }

    @keyframes sunset-move {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .top-bar {
      position: absolute; top: 0; left: 0; right: 0; padding: 25px 40px;
      display: flex; justify-content: space-between; align-items: center; z-index: 10;
    }

    /* Fixed Bottom Left Home Button */
    .home-anchor {
      position: fixed; bottom: 25px; left: 25px; z-index: 20;
    }

    #clock {
      font-size: 0.9rem; color: white; background: rgba(0,0,0,0.3); 
      padding: 8px 18px; border-radius: 50px; backdrop-filter: blur(10px);
    }

    .icon-btn {
      cursor: pointer; background: rgba(0,0,0,0.3); padding: 12px; 
      border-radius: 50px; backdrop-filter: blur(10px); transition: 0.3s;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.1); outline: none;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.15); transform: scale(1.1); }

    .container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    
    .glass-panel {
      background: rgba(0,0,0,0.3); backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px;
      padding: 60px 40px; width: 500px; text-align: center;
    }

    h1 { font-size: 3.5rem; margin-bottom: 40px; letter-spacing: 15px; font-weight: 300; color: white; margin-top: 0; }

    input {
      width: 100%; max-width: 400px; padding: 18px; border-radius: 15px; 
      border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.08); 
      color: white; font-size: 1rem; outline: none; text-align: center;
    }

    .bookmarks { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 40px; width: 100%; }
    
    .bookmark-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.3s; height: 80px; }
    .bookmark-item:hover { transform: translateY(-5px); }
    .bookmark-item span { font-size: 0.6rem; margin-top: 10px; color: white; opacity: 0.7; font-weight: 600; letter-spacing: 1px; }

    .svg-icon { width: 28px; height: 28px; }
    .emoji-icon { font-size: 28px; line-height: 1; }

    #settings-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
      display: none; justify-content: center; align-items: center; z-index: 100;
    }
    .settings-content {
      background: rgba(255,255,255,0.05); padding: 40px; border-radius: 35px; 
      width: 450px; max-height: 80vh; overflow-y: auto; color: white; border: 1px solid rgba(255,255,255,0.1);
    }

    .settings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    
    .section-label { font-size: 0.7rem; opacity: 0.4; letter-spacing: 2px; margin: 25px 0 10px 0; font-weight: 800; color: var(--accent); }
    
    .option { 
      background: rgba(255,255,255,0.05); padding: 12px 20px; border-radius: 12px; 
      margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s;
    }
    .option:hover { background: rgba(255,255,255,0.1); }
    .option span:last-child { font-size: 0.7rem; opacity: 0.6; font-weight: 800; }
  </style>
</head>
<body>

  <!-- Settings Overlay -->
  <div id="settings-overlay">
    <div class="settings-content">
      <div class="settings-header">
        <h2 style="margin:0; font-weight:300;">System Config</h2>
        <span onclick="toggleSettings()" style="cursor:pointer; font-size:1.5rem;">&times;</span>
      </div>

      <div class="section-label">CLOAK GALLERY</div>
      <div class="option cloak-opt" data-type="none" onclick="setCloak('none')"><span>Default (Mars)</span><span>ACTIVE</span></div>
      <div class="option cloak-opt" data-type="drive" onclick="setCloak('drive')"><span>Google Drive</span><span>SELECT</span></div>
      <div class="option cloak-opt" data-type="classroom" onclick="setCloak('classroom')"><span>Classroom</span><span>SELECT</span></div>
      <div class="option cloak-opt" data-type="gmail" onclick="setCloak('gmail')"><span>Gmail</span><span>SELECT</span></div>

      <div class="section-label">THEME ENGINE</div>
      <div class="option" onclick="setTheme('sunset')"><span>Mars Sunset</span><span>SELECT</span></div>
      <div class="option" onclick="setTheme('midnight')"><span>Midnight Void</span><span>SELECT</span></div>
      <div class="option" onclick="setTheme('nebula')"><span>Purple Nebula</span><span>SELECT</span></div>
      <div class="option" onclick="setTheme('glacier')"><span>Arctic Glacier</span><span>SELECT</span></div>

      <div class="section-label">PRIVACY</div>
      <div class="option"><span>Panic Key</span><span>` (BACKTICK)</span></div>
      <div class="option" onclick="alert('Credits: Built for Mars OS\nEngine: Ultraviolet')"><span>Credits</span><span>VIEW</span></div>
    </div>
  </div>

  <!-- UI Navigation -->
  <div class="top-bar">
    <div id="clock">00:00:00</div>
    <div class="icon-btn" onclick="toggleSettings()">⚙️</div>
  </div>

  <div class="home-anchor">
    <div class="icon-btn" onclick="location.reload()">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
    </div>
  </div>

  <!-- Main UI -->
  <div class="container">
    <div class="glass-panel">
      <h1>MARS</h1>
      <form id="uv-form" style="width:100%;">
        <input id="uv-address" type="text" placeholder="Where to next..." autocomplete="off">
      </form>
      <div class="bookmarks">
        <div class="bookmark-item" onclick="proxy('https://gn-math.dev')"><div class="emoji-icon">🎮</div><span>GAMES</span></div>
        <div class="bookmark-item" onclick="proxy('https://dorawatch.org')"><div class="emoji-icon">🎬</div><span>MOVIES</span></div>
        <div class="bookmark-item" onclick="proxy('https://monochrome.tf')"><div class="emoji-icon">🎵</div><span>MUSIC</span></div>
        <div class="bookmark-item" onclick="proxy('https://google.com')">
          <svg class="svg-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          <span>GOOGLE</span>
        </div>
        <div class="bookmark-item" onclick="proxy('https://youtube.com')">
          <svg class="svg-icon" viewBox="0 0 24 24"><path fill="#FF0000" d="M23.5 6.2c-.3-1.1-1.1-1.9-2.2-2.2C19.4 3.5 12 3.5 12 3.5s-7.4 0-9.3.5c-1.1.3-1.9 1.1-2.2 2.2C0 8.1 0 12 0 12s0 3.9.5 5.8c.3 1.1 1.1 1.9 2.2 2.2 1.9.5 9.3.5 9.3.5s7.4 0 9.3-.5c1.1-.3 1.9-1.1 2.2-2.2.5-1.9.5-5.8.5-5.8s0-3.9-.5-5.8z"/><path fill="#FFF" d="M9.5 15.5l6.3-3.5-6.3-3.5z"/></svg>
          <span>YOUTUBE</span>
        </div>
      </div>
    </div>
  </div>

<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script>
  const cloaks = {
    none: { t: "Mars", i: "https://google.com" },
    drive: { t: "My Drive - Google Drive", i: "https://gstatic.com" },
    classroom: { t: "Classes", i: "https://gstatic.com" },
    gmail: { t: "Gmail", i: "https://gstatic.com" }
  };

  function setCloak(type) {
    const cloak = cloaks[type];
    document.title = cloak.t;
    
    document.querySelectorAll('.cloak-opt').forEach(opt => {
      opt.querySelector('span:last-child').innerText = "SELECT";
      opt.style.color = "white";
    });
    
    const selected = document.querySelector(`.cloak-opt[data-type="${type}"]`);
    if(selected) {
      selected.querySelector('span:last-child').innerText = "ACTIVE";
      selected.style.color = "var(--accent)";
    }

    localStorage.setItem('mars-cloak', type);
  }

  function setTheme(theme) {
    const bodies = {
      sunset: 'linear-gradient(-45deg, #2e0249, #570a57, #a91079, #ff6b6b, #ffa500)',
      midnight: 'linear-gradient(-45deg, #000000, #1a1a2e, #16213e, #0f3460)',
      nebula: 'linear-gradient(-45deg, #020111, #3a1c71, #d76d77, #ffaf7b)',
      glacier: 'linear-gradient(-45deg, #203a43, #2c5364, #0f2027)'
    };
    document.body.style.background = bodies[theme];
    localStorage.setItem('mars-theme', theme);
  }

  function toggleSettings() {
    const overlay = document.getElementById('settings-overlay');
    overlay.style.display = overlay.style.display === 'flex' ? 'none' : 'flex';
  }

  function updateClock() {
    const now = new Date();
    document.getElementById('clock').innerText = now.toLocaleTimeString();
  }
  setInterval(updateClock, 1000);

  window.onload = () => {
    const savedCloak = localStorage.getItem('mars-cloak') || 'none';
    const savedTheme = localStorage.getItem('mars-theme') || 'sunset';
    setCloak(savedCloak);
    setTheme(savedTheme);
    updateClock();
  };

  const form = document.getElementById('uv-form');
  const address = document.getElementById('uv-address');
  form?.addEventListener('submit', e => {
    e.preventDefault();
    proxy(address.value);
  });

  function proxy(url) {
    if (!url.includes('.') || url.includes(' ')) {
      url = 'https://google.com' + encodeURIComponent(url);
    } else if (!(url.startsWith('https://') || url.startsWith('http://'))) {
      url = 'https://' + url;
    }
    window.location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
  }

  window.addEventListener('keydown', e => {
    if (e.key === '`') window.location.href = 'https://google.com';
  });
</script>
</body>
</html>
