<!DOCTYPE html>
<html>
<head>
  <title>Mars Proxy</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* This creates the Mars Sunset Gradient */
    .background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: linear-gradient(180deg, #0a0a2a 0%, #4a1e1e 40%, #ff4500 80%, #ff8c00 100%);
      background-size: 400% 400%;
      animation: sunset-glow 15s ease infinite;
    }

    @keyframes sunset-glow {
      0% { background-position: 50% 0%; }
      50% { background-position: 50% 100%; }
      100% { background-position: 50% 0%; }
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: white;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      letter-spacing: 5px;
    }

    p {
      font-size: 1.2rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <div class="background"></div>

  <div class="container">
    <h1>WELCOME TO MARS</h1>
    <p>Preparing for landing...</p>
    <!-- Keep your search bar code below this line -->
    
  </div>

</body>
</html>
