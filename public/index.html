<!DOCTYPE html>
<html>
<head>
  <title>Mars</title>
  <link rel="icon" type="image/png" href="https://flaticon.com">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(180deg, #0a0a2a 0%, #4a1e1e 40%, #ff4500 80%, #ff8c00 100%);
      background-size: 400% 400%;
      animation: sunset-glow 15s ease infinite;
    }

    @keyframes sunset-glow {
      0% { background-position: 50% 0%; }
      50% { background-position: 50% 100%; }
      100% { background-position: 50% 0%; }
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: white;
    }

    /* The Glassy Box */
    .glass-panel {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      text-align: center;
      width: 80%;
      max-width: 500px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
      letter-spacing: 3px;
      font-weight: 300;
    }

    /* Smooth Glassy Search Bar */
    input {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 1rem;
      outline: none;
      transition: 0.3s;
      box-sizing: border-box;
    }

    input:focus {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="glass-panel">
      <h1>WELCOME TO MARS</h1>
      <form id="uv-form">
        <input id="uv-address" type="text" placeholder="Search the web or enter a URL" autocomplete="off">
      </form>
    </div>
  </div>
<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script>
  const form = document.querySelector('form');
  const input = document.querySelector('input');

  form.addEventListener('submit', async event => {
    event.preventDefault();
    window.navigator.serviceWorker.register('/uv/sw.js', {
      scope: __uv$config.prefix
    }).then(() => {
      let url = input.value.trim();
      if (!isUrl(url)) url = 'https://google.com' + url;
      else if (!(url.startsWith('https://') || url.startsWith('http://'))) url = 'http://' + url;

      window.location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
    });
  });

  function isUrl(val = '') {
    if (/^http(s?):\/\//.test(val) || val.includes('.') && val.substr(0, 1) !== ' ') return true;
    return false;
  };
</script>

</body>
</html>
